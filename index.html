<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Friendly Visualizer Recorder</title>
    <style>
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { margin: 0; background: #0b0b16; color: #fff; padding: 15px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
        .container { width: 100%; max-width: 500px; background: #131326; padding: 20px; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.3); border: 1px solid #252545; }
        h2 { font-size: 18px; color: #00f0ff; margin-top: 0; text-align: center; text-transform: uppercase; }
        .control-group { margin-bottom: 15px; display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 11px; text-transform: uppercase; color: #8c8ca3; font-weight: bold; }
        input[type="text"], input[type="file"], select { background: #1c1c38; border: 1px solid #32325d; color: #fff; padding: 12px; border-radius: 8px; font-size: 14px; width: 100%; }
        .canvas-container { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 8px; overflow: hidden; margin-bottom: 15px; border: 1px solid #252545; }
        #canvas { width: 100%; height: 100%; display: block; }
        .btn { background: #ff0055; color: #fff; border: none; padding: 15px; border-radius: 8px; font-weight: bold; font-size: 14px; cursor: pointer; text-transform: uppercase; width: 100%; transition: 0.2s; }
        .btn:disabled { background: #252542; color: #5c5c7d; cursor: not-allowed; }
        .status-box { background: #0b0b16; padding: 12px; border-radius: 8px; font-size: 13px; color: #a0a0c0; text-align: center; margin-top: 15px; line-height: 1.4; border: 1px solid #1c1c38; }
        .progress-bar-container { width: 100%; background: #1c1c38; height: 8px; border-radius: 4px; overflow: hidden; display: none; margin-top: 10px; }
        .progress-bar { width: 0%; height: 100%; background: #00f0ff; transition: width 0.1s linear; }
        audio { width: 100%; margin-top: 10px; display: none; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Mobile Visualizer Studio</h2>
        
        <div class="canvas-container">
            <canvas id="canvas" width="1280" height="720"></canvas>
        </div>

        <div class="control-group">
            <label>1. Pilih Lagu / Audio</label>
            <input type="file" id="audio-input" accept="audio/*">
        </div>
        
        <div class="control-group">
            <label>Nama Artis & Judul</label>
            <input type="text" id="artist-text" value="SRISP - Gravity of Light">
        </div>

        <div class="control-group">
            <label>Gaya Spektrum</label>
            <select id="template-select">
                <option value="bar">Music Bars</option>
                <option value="wave">Waveform / Garis</option>
            </select>
        </div>

        <button id="action-btn" class="btn" disabled>Pilih Musik Dahulu</button>
        
        <div class="progress-bar-container" id="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        
        <div id="status-text" class="status-box">Silakan masukkan file audio untuk memulai di HP.</div>
        
        <audio id="audio-player" controls></audio>
    </div>

    <script>
        const audioInput = document.getElementById('audio-input');
        const artistText = document.getElementById('artist-text');
        const templateSelect = document.getElementById('template-select');
        const actionBtn = document.getElementById('action-btn');
        const statusText = document.getElementById('status-text');
        const progressContainer = document.getElementById('progress-container');
        const progressBar = document.getElementById('progress-bar');
        const audioPlayer = document.getElementById('audio-player');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let audioCtx = null;
        let analyser = null;
        let source = null;
        let mediaRecorder = null;
        let recordedChunks = [];
        let animationFrameId = null;
        let isRecording = false;

        // Render Preview Awal
        function drawPreview() {
            ctx.fillStyle = "#06060e";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = "rgba(255,255,255,0.1)";
            ctx.fillRect(100, 400, 1080, 20);

            ctx.font = "bold 50px sans-serif";
            ctx.fillStyle = "#ffffff";
            ctx.textAlign = "center";
            ctx.fillText(artistText.value.toUpperCase(), canvas.width / 2, canvas.height / 2);
        }
        drawPreview();
        artistText.addEventListener('input', drawPreview);
        templateSelect.addEventListener('change', drawPreview);

        // Membaca file Audio di HP
        audioInput.addEventListener('change', function() {
            if (this.files.length === 0) return;
            const file = this.files[0];
            audioPlayer.src = URL.createObjectURL(file);
            
            statusText.innerText = "Audio siap! Klik tombol di bawah untuk mulai merekam video.";
            actionBtn.disabled = false;
            actionBtn.innerText = "Mulai Rekam Video";
            drawPreview();
        });

        // Loop Gambar Real-time yang kompatibel dengan HP
        function renderLoop() {
            animationFrameId = requestAnimationFrame(renderLoop);
            
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            
            if (templateSelect.value === 'bar') {
                analyser.getByteFrequencyData(dataArray);
            } else {
                analyser.getByteTimeDomainData(dataArray);
            }

            // Bersihkan Background
            ctx.fillStyle = "#06060e";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Gambar Spektrum Musik
            ctx.fillStyle = "#00f0ff";
            ctx.strokeStyle = "#00f0ff";
            ctx.shadowBlur = 20;
            ctx.shadowColor = "#00f0ff";

            if (templateSelect.value === 'bar') {
                const barWidth = (canvas.width / 60);
                let x = 0;
                for (let i = 0; i < 60; i++) {
                    let barHeight = (dataArray[i] / 255) * 300;
                    ctx.fillRect(x, canvas.height * 0.4 - (barHeight/2), barWidth - 4, barHeight + 10);
                    x += barWidth;
                }
            } else {
                ctx.lineWidth = 6;
                ctx.beginPath();
                const sliceWidth = canvas.width / bufferLength;
                let x = 0;
                for (let i = 0; i < bufferLength; i++) {
                    let v = dataArray[i] / 128.0;
                    let y = v * (canvas.height / 2) * 0.8;
                    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                    x += sliceWidth;
                }
                ctx.stroke();
            }
            ctx.shadowBlur = 0;

            // Gambar Teks
            ctx.font = "bold 55px sans-serif";
            ctx.fillStyle = "#ffffff";
            ctx.textAlign = "center";
            ctx.fillText(artistText.value.toUpperCase(), canvas.width / 2, canvas.height * 0.75);

            // Update Persentase Berdasarkan Durasi Lagu Lagu
            if (audioPlayer.duration) {
                const pct = (audioPlayer.currentTime / audioPlayer.duration) * 100;
                progressBar.style.width = pct + "%";
                statusText.innerText = `Sedang Merekam: ${Math.floor(pct)}% (${Math.floor(audioPlayer.currentTime)}s / ${Math.floor(audioPlayer.duration)}s)`;
            }
        }

        // Aksi Tombol Rekam
        actionBtn.addEventListener('click', async () => {
            if (!isRecording) {
                // Mulai Rekam
                isRecording = true;
                actionBtn.disabled = true;
                progressContainer.style.display = "block";
                recordedChunks = [];

                // Setup Web Audio API versi HP
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    analyser = audioCtx.createAnalyser();
                    analyser.fftSize = 256;
                    source = audioCtx.createMediaElementSource(audioPlayer);
                    source.connect(analyser);
                    analyser.connect(audioCtx.destination);
                }

                // Gabungkan Jalur Video Canvas & Jalur Audio Player
                const videoStream = canvas.captureStream(30); 
                const audioStream = audioPlayer.captureStream ? audioPlayer.captureStream() : audioPlayer.webkitCaptureStream();
                
                const combinedStream = new MediaStream();
                videoStream.getVideoTracks().forEach(track => combinedStream.addTrack(track));
                audioStream.getAudioTracks().forEach(track => combinedStream.addTrack(track));

                // Tentukan format rekam terbaik untuk HP
                let options = { mimeType: 'video/webm;codecs=vp8' };
                if (!MediaRecorder.isTypeSupported(options.mimeType)) {
                    options = { mimeType: 'video/mp4' };
                }

                mediaRecorder = new MediaRecorder(combinedStream, options);
                
                mediaRecorder.ondataavailable = (e) => {
                    if (e.data && e.data.size > 0) recordedChunks.push(e.data);
                };

                mediaRecorder.onstop = () => {
                    cancelAnimationFrame(animationFrameId);
                    const blob = new Blob(recordedChunks, { type: mediaRecorder.mimeType });
                    const url = URL.createObjectURL(blob);
                    
                    // Unduh Otomatis di HP
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `${artistText.value.replace(/[^a-z0-9]/gi, '_').toLowerCase()}.mp4`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);

                    statusText.innerText = "Selesai! Video berhasil direkam dan diunduh ke HP Anda.";
                    actionBtn.disabled = false;
                    actionBtn.innerText = "Mulai Rekam Video";
                    progressContainer.style.style.display = "none";
                    isRecording = false;
                };

                // Jalankan Pemutar dan Perekam secara sinkron
                audioPlayer.play();
                mediaRecorder.start();
                renderLoop();
                actionBtn.innerText = "Merekam... Jangan Tutup Layar";
            }
        });

        // Jika lagu habis, otomatis stop rekaman dan download
        audioPlayer.addEventListener('ended', () => {
            if (mediaRecorder && mediaRecorder.state !== "inactive") {
                mediaRecorder.stop();
            }
        });
    </script>
</body>
</html>
