<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Visualizer Studio Pro v8.5</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@700&family=Playfair+Display:ital,wght@1,600&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { margin: 0; background: #05050a; color: #fff; padding: 10px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 500px; background: #0f0f1e; padding: 15px; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.6); border: 1px solid #1f1f3a; }
        h2 { font-size: 15px; color: #00f0ff; margin-top: 0; text-align: center; text-transform: uppercase; letter-spacing: 1px; }
        .control-group { margin-bottom: 10px; display: flex; flex-direction: column; gap: 3px; }
        label { font-size: 10px; text-transform: uppercase; color: #8c8ca3; font-weight: bold; }
        input[type="text"], input[type="file"], select, input[type="range"] { background: #15152a; border: 1px solid #25254a; color: #fff; padding: 8px; border-radius: 6px; font-size: 12px; width: 100%; }
        .canvas-container { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 8px; overflow: hidden; margin-bottom: 12px; border: 1px solid #25254a; }
        #canvas { width: 100%; height: 100%; display: block; }
        .btn-row { display: flex; gap: 10px; margin-bottom: 5px; }
        .btn { color: #fff; border: none; padding: 12px; border-radius: 6px; font-weight: bold; font-size: 13px; cursor: pointer; text-transform: uppercase; flex: 1; }
        #preview-btn { background: #00f0ff; color: #05050a; }
        #action-btn { background: #ff0055; }
        .btn:disabled { background: #1b1b30 !important; color: #4a4a6a !important; cursor: not-allowed; }
        .status-box { background: #05050a; padding: 8px; border-radius: 6px; font-size: 11px; color: #a0a0c0; text-align: center; margin-top: 10px; border: 1px solid #15152a; }
        .progress-bar-container { width: 100%; background: #15152a; height: 5px; border-radius: 3px; overflow: hidden; display: none; margin-top: 8px; }
        .progress-bar { width: 0%; height: 100%; background: #00f0ff; }
        audio { display: none; }
        .row { display: flex; gap: 8px; }
        .row > div { flex: 1; }
        .section-title { font-size: 11px; color: #ff0055; font-weight: bold; margin: 10px 0 5px 0; text-transform: uppercase; border-bottom: 1px solid #25254a; padding-bottom: 2px; }
        .footer { text-align: center; font-size: 10px; color: #4a4a6a; margin-top: 15px; border-top: 1px solid #15152a; padding-top: 8px; letter-spacing: 0.5px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Mobile Studio Pro v8.5</h2>
        
        <div class="canvas-container">
            <canvas id="canvas" width="1280" height="720"></canvas>
        </div>

        <div class="control-group">
            <label>1. Pilih Musik</label>
            <input type="file" id="audio-input" accept="audio/*">
        </div>

        <div class="btn-row">
            <button id="preview-btn" class="btn" disabled>Play Preview</button>
            <button id="action-btn" class="btn" disabled>Mulai Rekam Video</button>
        </div>
        <div class="progress-bar-container" id="progress-container"><div class="progress-bar" id="progress-bar"></div></div>
        <div id="status-text" class="status-box">Silakan masukkan file musik untuk mengaktifkan studio.</div>

        <div class="section-title">Instant Profile Templates</div>
        <div class="control-group">
            <label>Pilih Template Cepat</label>
            <select id="profile-select">
                <option value="none">-- Tetapkan Parameter Manual / Kustom --</option>
                <option value="cyber">Cyber Rave (Rainbow + Tunnel + Starburst)</option>
                <option value="chill">Ambient Chill (Emerald + Snow + DNA Helix)</option>
                <option value="retro">Retro Wave (Ruby Red + Meteor + Radial Radar)</option>
            </select>
        </div>

        <div class="section-title">Konfigurasi Teks</div>
        <div class="row">
            <div class="control-group"><label>Artis</label><input type="text" id="artist-text" value="SRISP"></div>
            <div class="control-group"><label>Judul</label><input type="text" id="title-text" value="Gravity of Light"></div>
        </div>
        <div class="row">
            <div class="control-group">
                <label>Gaya Font</label>
                <select id="font-select">
                    <option value="bold 60px 'Montserrat'">Montserrat</option>
                    <option value="italic 60px 'Playfair Display'">Playfair</option>
                    <option value="65px 'Bebas Neue'">Bebas Neue</option>
                    <option value="bold 50px 'Courier New'">Courier New</option>
                </select>
            </div>
            <div class="control-group"><label>Teks Kiri-Kanan</label><input type="range" id="text-x-slider" min="100" max="1180" value="640"></div>
            <div class="control-group"><label>Teks Atas-Bawah</label><input type="range" id="text-y-slider" min="100" max="680" value="540"></div>
        </div>

        <div class="section-title">Konfigurasi Grafik Spektrum</div>
        <div class="row">
            <div class="control-group">
                <label>Bentuk Spektrum</label>
                <select id="template-select">
                    <option value="bar">Classic Music Bars</option>
                    <option value="double-bar">Mirror Twin Bars</option>
                    <option value="updown">Up-Down Equalizer</option>
                    <option value="wave">Waveform Glowing Line</option>
                    <option value="spike">Spike Pulse Matrix</option>
                    <option value="circle">Circular Aura Rhythm</option>
                    <option value="split">Side-by-Side Split</option>
                    <option value="circle-wave">Circular Wave Ring</option>
                    <option value="block">Solid Block Staircase</option>
                    <option value="dna">DNA Helix Mode</option>
                    <option value="radar">Radial Radar</option>
                    <option value="starburst">Starburst Explosion</option>
                </select>
            </div>
            <div class="control-group">
                <label>Skema Warna (Transparan)</label>
                <select id="color-select">
                    <option value="rainbow">Pelangi (Rainbow Pulse)</option>
                    <option value="rgba(0,240,255,0.65)">Neon Cyan</option>
                    <option value="rgba(255,0,85,0.65)">Ruby Red</option>
                    <option value="rgba(0,255,102,0.65)">Lime Emerald</option>
                    <option value="rgba(255,255,255,0.55)">Crystal White</option>
                </select>
            </div>
        </div>
        <div class="row">
            <div class="control-group"><label>Posisi Atas-Bawah</label><input type="range" id="spec-y-slider" min="50" max="670" value="340"></div>
            <div class="control-group"><label>Lebar Bentangan</label><input type="range" id="spec-w-slider" min="400" max="1280" value="1280"></div>
            <div class="control-group"><label>Sensitivitas Tinggi</label><input type="range" id="spec-h-slider" min="50" max="500" value="260"></div>
        </div>

        <div class="section-title">Latar Belakang & Efek Partikel</div>
        <div class="row">
            <div class="control-group">
                <label>Jenis Efek</label>
                <select id="particle-type">
                    <option value="meteor">Meteor / Bintang Jatuh</option>
                    <option value="bubbles">Bubbles / Gelembung Naik</option>
                    <option value="snow">Snowflake / Salju Lembut</option>
                    <option value="tunnel">Tunnel / Lorong Waktu 3D</option>
                    <option value="chaos">Chaos Pulse / Denyut Acak</option>
                    <option value="none">Matikan Efek Partikel</option>
                </select>
            </div>
            <div class="control-group">
                <label>Background</label>
                <select id="bg-select">
                    <option value="dj">Default: DJ Console</option>
                    <option value="custom">-- Foto Kustom --</option>
                </select>
            </div>
        </div>
        <div class="row">
            <div class="control-group"><label>Jumlah</label><input type="range" id="particle-count" min="10" max="150" value="60"></div>
            <div class="control-group"><label>Ukuran Max</label><input type="range" id="particle-size" min="2" max="15" value="5"></div>
            <div class="control-group"><label>Kecepatan Dasar</label><input type="range" id="particle-speed" min="0.1" max="15" step="0.1" value="3"></div>
        </div>
        <input type="file" id="bg-custom-input" accept="image/*" style="display: none; margin-top: 5px;">
        
        <audio id="audio-player"></audio>
        <div class="footer">Copyright SRISP 2026</div>
    </div>

    <script>
        const canvas = document.getElementById('canvas'); const ctx = canvas.getContext('2d');
        const audioInput = document.getElementById('audio-input'); const artistText = document.getElementById('artist-text');
        const titleText = document.getElementById('title-text'); const fontSelect = document.getElementById('font-select');
        const textXSlider = document.getElementById('text-x-slider'); const textYSlider = document.getElementById('text-y-slider');
        const templateSelect = document.getElementById('template-select'); const colorSelect = document.getElementById('color-select');
        const specYSlider = document.getElementById('spec-y-slider'); const specWSlider = document.getElementById('spec-w-slider');
        const specHSlider = document.getElementById('spec-h-slider'); const bgSelect = document.getElementById('bg-select');
        const bgCustomInput = document.getElementById('bg-custom-input'); const actionBtn = document.getElementById('action-btn');
        const previewBtn = document.getElementById('preview-btn'); const statusText = document.getElementById('status-text');
        const progressContainer = document.getElementById('progress-container'); const progressBar = document.getElementById('progress-bar');
        const audioPlayer = document.getElementById('audio-player');
        const particleType = document.getElementById('particle-type'); const particleCount = document.getElementById('particle-count');
        const particleSize = document.getElementById('particle-size'); const particleSpeed = document.getElementById('particle-speed');
        const profileSelect = document.getElementById('profile-select');

        let audioCtx = null, analyser = null, source = null, mediaRecorder = null, recordedChunks = [], animationFrameId = null, isRecording = false, isPreviewing = false, uploadedBgImg = null;
        let wakeLock = null;
        
        // Sistem Anti-Padam Layar (Wake Lock API)
        async function requestWakeLock() {
            if ('wakeLock' in navigator) {
                try {
                    wakeLock = await navigator.wakeLock.request('screen');
                    console.log('Wake Lock aktif. Layar tidak akan padam.');
                } catch (err) {
                    console.warn(`Gagal mengaktifkan Wake Lock: ${err.message}`);
                }
            }
        }

        function releaseWakeLock() {
            if (wakeLock !== null) {
                wakeLock.release().then(() => { wakeLock = null; });
            }
        }

        // Logic Template Instan Profil
        profileSelect.addEventListener('change', function() {
            if (this.value === 'cyber') {
                colorSelect.value = 'rainbow';
                particleType.value = 'tunnel';
                templateSelect.value = 'starburst';
                particleSpeed.value = '2.5';
            } else if (this.value === 'chill') {
                colorSelect.value = 'rgba(0,255,102,0.65)';
                particleType.value = 'snow';
                templateSelect.value = 'dna';
                particleSpeed.value = '0.5';
            } else if (this.value === 'retro') {
                colorSelect.value = 'rgba(255,0,85,0.65)';
                particleType.value = 'meteor';
                templateSelect.value = 'radar';
                particleSpeed.value = '5.0';
            }
            initParticles();
            drawPreview();
        });

        const particles = [];
        function initParticles() {
            particles.length = 0;
            const count = parseInt(particleCount.value);
            const maxSize = parseInt(particleSize.value);
            for(let i=0; i<count; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    z: Math.random() * canvas.width, 
                    speedFactor: Math.random() * 0.7 + 0.3,
                    size: Math.random() * (maxSize - 1) + 1,
                    alpha: Math.random() * 0.5 + 0.3,
                    angle: Math.random() * Math.PI * 2 
                });
            }
        }
        initParticles();
        particleCount.addEventListener('input', initParticles);
        particleSize.addEventListener('input', initParticles);
        particleSpeed.addEventListener('input', initParticles);
        particleType.addEventListener('change', initParticles);

        bgSelect.addEventListener('change', function() {
            bgCustomInput.style.display = (this.value === 'custom') ? 'block' : 'none';
            if(this.value !== 'custom') { uploadedBgImg = null; drawPreview(); }
        });

        bgCustomInput.addEventListener('change', function() {
            if (this.files.length === 0) return;
            const reader = new FileReader();
            reader.onload = e => { uploadedBgImg = new Image(); uploadedBgImg.src = e.target.result; uploadedBgImg.onload = drawPreview; };
            reader.readAsDataURL(this.files[0]);
        });

        function drawDJConsole() {
            ctx.fillStyle = "#04040a"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = "rgba(0, 240, 255, 0.25)"; ctx.lineWidth = 5;
            ctx.beginPath(); ctx.arc(280, 360, 150, 0, Math.PI * 2); ctx.stroke();
            ctx.beginPath(); ctx.arc(280, 360, 60, 0, Math.PI * 2); ctx.stroke();
            ctx.strokeStyle = "rgba(255, 0, 85, 0.25)";
            ctx.beginPath(); ctx.arc(1000, 360, 150, 0, Math.PI * 2); ctx.stroke();
            ctx.beginPath(); ctx.arc(1000, 360, 60, 0, Math.PI * 2); ctx.stroke();
            ctx.fillStyle = "rgba(15, 15, 30, 0.7)"; ctx.fillRect(520, 120, 240, 480);
            ctx.strokeStyle = "rgba(45, 45, 90, 0.5)"; ctx.strokeRect(520, 120, 240, 480);
            for(let i=0; i<3; i++) {
                ctx.fillStyle = "rgba(255, 255, 255, 0.1)"; ctx.fillRect(560 + (i*50), 400, 10, 140);
                ctx.fillStyle = "#ffffff"; ctx.fillRect(556 + (i*50), 450, 18, 12);
            }
        }

        function drawBackground() {
            if (bgSelect.value === 'custom' && uploadedBgImg) {
                ctx.drawImage(uploadedBgImg, 0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "rgba(5, 5, 12, 0.5)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            } else {
                drawDJConsole();
            }
        }

        function updateAndDrawParticles(audioIntensity) {
            const type = particleType.value;
            if (type === 'none') return;

            const sliderSpeed = parseFloat(particleSpeed.value);
            const maxSize = parseInt(particleSize.value);

            particles.forEach(p => {
                let currentSpeed = (sliderSpeed * p.speedFactor) + (audioIntensity * 25);
                let currentSize = p.size + (audioIntensity * (maxSize * 1.5));
                let drawX = p.x;
                let drawY = p.y;
                let finalAlpha = Math.min(1, p.alpha + audioIntensity);

                if (type === 'meteor') {
                    p.y += currentSpeed;
                    if(p.y > canvas.height) { p.y = 0; p.x = Math.random() * canvas.width; }
                } 
                else if (type === 'bubbles') {
                    p.y -= currentSpeed * 0.7;
                    if(p.y < 0) { p.y = canvas.height; p.x = Math.random() * canvas.width; }
                } 
                else if (type === 'snow') {
                    p.y += currentSpeed * 0.4;
                    p.angle += 0.02;
                    drawX += Math.sin(p.angle) * 2;
                    if(p.y > canvas.height) { p.y = 0; p.x = Math.random() * canvas.width; }
                } 
                else if (type === 'tunnel') {
                    p.z -= currentSpeed * 1.5;
                    if (p.z <= 0) {
                        p.z = canvas.width;
                        p.x = Math.random() * canvas.width - canvas.width / 2;
                        p.y = Math.random() * canvas.height - canvas.height / 2;
                    }
                    drawX = (p.x / p.z) * canvas.width + canvas.width / 2;
                    drawY = (p.y / p.z) * canvas.height + canvas.height / 2;
                    currentSize = (maxSize * (canvas.width / p.z)) * 0.2;
                    
                    if(drawX < 0 || drawX > canvas.width || drawY < 0 || drawY > canvas.height) {
                        p.z = canvas.width;
                    }
                }
                else if (type === 'chaos') {
                    finalAlpha = Math.min(1, (p.alpha * 0.3) + (audioIntensity * 1.2));
                    currentSize = p.size + (audioIntensity * maxSize * 3.5);
                }

                ctx.beginPath();
                ctx.arc(drawX, drawY, Math.max(0.5, currentSize), 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${finalAlpha})`;
                ctx.fill();
            });
        }

        function drawPreview() {
            if (isPreviewing || isRecording) return;
            drawBackground();
            updateAndDrawParticles(0.02);
            
            const textX = parseInt(textXSlider.value); const textY = parseInt(textYSlider.value);
            ctx.textAlign = "center"; ctx.fillStyle = "#ffffff";
            ctx.font = fontSelect.value; ctx.fillText(artistText.value, textX, textY);
            ctx.font = "35px sans-serif"; ctx.fillStyle = "rgba(255, 255, 255, 0.7)";
            ctx.fillText(titleText.value, textX, textY + 50);
        }

        [artistText, titleText, fontSelect, textXSlider, textYSlider, templateSelect, colorSelect, specYSlider, specWSlider, specHSlider, bgSelect, particleType, particleSpeed].forEach(el => {
            el.addEventListener('input', drawPreview); el.addEventListener('change', drawPreview);
        });

        audioInput.addEventListener('change', function() {
            if (this.files.length === 0) return;
            audioPlayer.src = URL.createObjectURL(this.files[0]);
            statusText.innerText = "Musik dimuat! Sesuaikan parameter lalu tes visual via 'Play Preview'.";
            actionBtn.disabled = false; previewBtn.disabled = false;
            drawPreview();
        });

        function setupAudioNodes() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser(); analyser.fftSize = 256;
                source = audioCtx.createMediaElementSource(audioPlayer);
                source.connect(analyser); analyser.connect(audioCtx.destination);
            }
        }

        function renderLoop() {
            if (!isPreviewing && !isRecording) return;
            animationFrameId = requestAnimationFrame(renderLoop);
            
            const bufferLength = analyser.frequencyBinCount;
            const dataArray = new Uint8Array(bufferLength);
            
            if (templateSelect.value === 'wave' || templateSelect.value === 'circle-wave') {
                analyser.getByteTimeDomainData(dataArray);
            } else {
                analyser.getByteFrequencyData(dataArray);
            }

            let sum = 0;
            for(let i=0; i<60; i++) sum += dataArray[i];
            let audioIntensity = (sum / 60) / 255;

            drawBackground();
            updateAndDrawParticles(audioIntensity);

            const specY = parseInt(specYSlider.value); const specW = parseInt(specWSlider.value);
            const specH = parseInt(specHSlider.value); const chosenColor = colorSelect.value;

            // Logika Warna Pelangi Alternatif Dinamis
            let dynamicColor = chosenColor;
            if(chosenColor === 'rainbow') {
                dynamicColor = `hsla(${(Date.now() / 25) % 360}, 100%, 60%, 0.75)`;
            }

            ctx.fillStyle = dynamicColor; ctx.strokeStyle = dynamicColor;
            ctx.lineWidth = 5; ctx.shadowBlur = 15; ctx.shadowColor = dynamicColor;

            const style = templateSelect.value;
            const startX = (canvas.width - specW) / 2;

            if (style === 'bar') {
                const barWidth = (specW / 60);
                for (let i = 0; i < 60; i++) {
                    if (chosenColor === 'rainbow') ctx.fillStyle = `hsla(${(i * 5 + Date.now() / 20) % 360}, 100%, 60%, 0.75)`;
                    let barHeight = (dataArray[i] / 255) * specH;
                    ctx.fillRect(startX + (i * barWidth), specY - barHeight, barWidth - 3, barHeight + 2);
                }
            } else if (style === 'double-bar') {
                const barWidth = (specW / 60);
                for (let i = 0; i < 60; i++) {
                    if (chosenColor === 'rainbow') { ctx.fillStyle = `hsla(${(i * 5 + Date.now() / 20) % 360}, 100%, 60%, 0.75)`; }
                    let barHeight = (dataArray[i] / 255) * (specH / 2);
                    ctx.fillRect(startX + (i * barWidth), specY - barHeight, barWidth - 3, barHeight);
                    ctx.fillRect(startX + (i * barWidth), specY, barWidth - 3, barHeight);
                }
            } else if (style === 'updown') {
                const barWidth = (specW / 50);
                for (let i = 0; i < 50; i++) {
                    if (chosenColor === 'rainbow') ctx.fillStyle = `hsla(${(i * 6 + Date.now() / 20) % 360}, 100%, 60%, 0.75)`;
                    let h = (dataArray[i] / 255) * specH;
                    ctx.fillRect(startX + (i * barWidth), specY - (h/2), barWidth - 4, h);
                }
            } else if (style === 'wave') {
                ctx.beginPath(); const sliceWidth = specW / bufferLength; let x = startX;
                for (let i = 0; i < bufferLength; i++) {
                    let v = dataArray[i] / 128.0; let y = specY + (v - 1.0) * specH;
                    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                    x += sliceWidth;
                }
                ctx.stroke();
            } else if (style === 'spike') {
                const step = specW / 40;
                for(let i=0; i<40; i++) {
                    if (chosenColor === 'rainbow') ctx.strokeStyle = `hsla(${(i * 8 + Date.now() / 20) % 360}, 100%, 60%, 0.75)`;
                    let h = (dataArray[i] / 255) * specH;
                    let xPos = startX + (i * step);
                    ctx.beginPath(); ctx.moveTo(xPos, specY); ctx.lineTo(xPos, specY - h); ctx.stroke();
                }
            } else if (style === 'circle') {
                ctx.beginPath(); const centerX = startX + (specW / 2); const baseRadius = specH / 3;
                for (let i = 0; i < 80; i++) {
                    let angle = (i / 80) * Math.PI * 2; let r = baseRadius + (dataArray[i % 40] / 255) * specH * 0.5;
                    let x = centerX + Math.cos(angle) * r; let y = specY + Math.sin(angle) * r;
                    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                }
                ctx.closePath(); ctx.stroke();
            } else if (style === 'split') {
                const barWidth = (specW / 2) / 30;
                const centerX = startX + (specW / 2);
                for(let i=0; i<30; i++) {
                    if (chosenColor === 'rainbow') ctx.fillStyle = `hsla(${(i * 10 + Date.now() / 20) % 360}, 100%, 60%, 0.75)`;
                    let h = (dataArray[i] / 255) * specH;
                    ctx.fillRect(centerX + (i * barWidth), specY - h, barWidth - 3, h + 2);
                    ctx.fillRect(centerX - (i * barWidth) - barWidth, specY - h, barWidth - 3, h + 2);
                }
            } else if (style === 'circle-wave') {
                ctx.beginPath(); const centerX = startX + (specW / 2); const baseRadius = specH / 3;
                for (let i = 0; i < bufferLength; i++) {
                    let angle = (i / bufferLength) * Math.PI * 2;
                    let v = dataArray[i] / 128.0; let r = baseRadius + (v - 1.0) * (specH * 0.5);
                    let x = centerX + Math.cos(angle) * r; let y = specY + Math.sin(angle) * r;
                    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                }
                ctx.closePath(); ctx.stroke();
            } else if (style === 'block') {
                const barWidth = (specW / 40);
                for (let i = 0; i < 40; i++) {
                    if (chosenColor === 'rainbow') ctx.fillStyle = `hsla(${(i * 8 + Date.now() / 20) % 360}, 100%, 60%, 0.75)`;
                    let blocks = Math.floor((dataArray[i] / 255) * 10);
                    for(let b=0; b<blocks; b++) {
                        ctx.fillRect(startX + (i * barWidth), specY - (b * (specH / 12)), barWidth - 4, (specH / 15));
                    }
                }
            } 
            // 1. TAMBAHAN FITUR: DNA Helix
            else if (style === 'dna') {
                const points = 40; const step = specW / points;
                for(let i=0; i<points; i++) {
                    if (chosenColor === 'rainbow') ctx.fillStyle = `hsla(${(i * 9 + Date.now() / 20) % 360}, 100%, 60%, 0.75)`;
                    let h = (dataArray[i % 30] / 255) * (specH / 2);
                    let xPos = startX + (i * step);
                    let offset = Math.sin(i * 0.5 + Date.now() / 300) * h;
                    
                    ctx.beginPath(); ctx.arc(xPos, specY + offset, 6, 0, Math.PI * 2); ctx.fill();
                    ctx.beginPath(); ctx.arc(xPos, specY - offset, 6, 0, Math.PI * 2); ctx.fill();
                    ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(xPos, specY + offset); ctx.lineTo(xPos, specY - offset); ctx.stroke();
                }
            } 
            // 2. TAMBAHAN FITUR: Radial Radar
            else if (style === 'radar') {
                const centerX = startX + (specW / 2); const maxRadius = specH * 0.7;
                const lines = 60;
                for(let i=0; i<lines; i++) {
                    let angle = (i / lines) * Math.PI * 2 + (Date.now() / 2000);
                    let intensity = (dataArray[i % 40] / 255) * maxRadius;
                    if (chosenColor === 'rainbow') ctx.strokeStyle = `hsla(${(i * 6 + Date.now() / 20) % 360}, 100%, 60%, 0.75)`;
                    ctx.beginPath(); ctx.moveTo(centerX, specY);
                    ctx.lineTo(centerX + Math.cos(angle) * intensity, specY + Math.sin(angle) * intensity);
                    ctx.stroke();
                }
            } 
            // 3. TAMBAHAN FITUR: Starburst Explosion
            else if (style === 'starburst') {
                const centerX = startX + (specW / 2); const innerR = specH / 4;
                const rays = 72;
                for(let i=0; i<rays; i++) {
                    let angle = (i / rays) * Math.PI * 2;
                    let len = (dataArray[i % 32] / 255) * specH * 0.7;
                    if (chosenColor === 'rainbow') ctx.strokeStyle = `hsla(${(i * 5 + Date.now() / 15) % 360}, 100%, 60%, 0.8)`;
                    ctx.beginPath();
                    ctx.moveTo(centerX + Math.cos(angle) * innerR, specY + Math.sin(angle) * innerR);
                    ctx.lineTo(centerX + Math.cos(angle) * (innerR + len), specY + Math.sin(angle) * (innerR + len));
                    ctx.stroke();
                }
            }

            ctx.shadowBlur = 0;
            const textX = parseInt(textXSlider.value); const textY = parseInt(textYSlider.value);
            ctx.textAlign = "center"; ctx.fillStyle = "#ffffff";
            ctx.font = fontSelect.value; ctx.fillText(artistText.value, textX, textY);
            ctx.font = "35px sans-serif"; ctx.fillStyle = "rgba(255, 255, 255, 0.7)";
            ctx.fillText(titleText.value, textX, textY + 50);

            if (isRecording && audioPlayer.duration) {
                const pct = (audioPlayer.currentTime / audioPlayer.duration) * 100;
                progressBar.style.width = pct + "%";
                statusText.innerText = `Sedang Merekam Video: ${Math.floor(pct)}% (${Math.floor(audioPlayer.currentTime)}s / ${Math.floor(audioPlayer.duration)}s)`;
            }
        }

        previewBtn.addEventListener('click', () => {
            if (isRecording) return;
            setupAudioNodes();

            if (!isPreviewing) {
                isPreviewing = true;
                audioPlayer.play();
                renderLoop();
                previewBtn.innerText = "Pause Preview";
                statusText.innerText = "Mode Preview Aktif.";
            } else {
                isPreviewing = false;
                audioPlayer.pause();
                cancelAnimationFrame(animationFrameId);
                previewBtn.innerText = "Play Preview";
                statusText.innerText = "Preview dihentikan.";
            }
        });

        actionBtn.addEventListener('click', async () => {
            if (isPreviewing) {
                isPreviewing = false; audioPlayer.pause(); cancelAnimationFrame(animationFrameId);
                previewBtn.innerText = "Play Preview";
            }
            
            // Aktifkan Wake Lock agar layar HP tidak padam saat proses rekam berjalan
            await requestWakeLock();

            isRecording = true; actionBtn.disabled = true; previewBtn.disabled = true;
            progressContainer.style.display = "block"; recordedChunks = [];
            
            setupAudioNodes();

            const videoStream = canvas.captureStream(30);
            const audioStream = audioPlayer.captureStream ? audioPlayer.captureStream() : audioPlayer.webkitCaptureStream();
            const combinedStream = new MediaStream();
            videoStream.getVideoTracks().forEach(track => combinedStream.addTrack(track));
            audioStream.getAudioTracks().forEach(track => combinedStream.addTrack(track));

            let options = { mimeType: 'video/webm;codecs=vp8' };
            if (!MediaRecorder.isTypeSupported(options.mimeType)) options = { mimeType: 'video/mp4' };

            mediaRecorder = new MediaRecorder(combinedStream, options);
            mediaRecorder.ondataavailable = (e) => { if (e.data && e.data.size > 0) recordedChunks.push(e.data); };
            mediaRecorder.onstop = () => {
                cancelAnimationFrame(animationFrameId);
                const blob = new Blob(recordedChunks, { type: mediaRecorder.mimeType });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url;
                a.download = `${artistText.value.trim()}_${titleText.value.trim()}.mp4`;
                document.body.appendChild(a); a.click(); document.body.removeChild(a);
                
                statusText.innerText = "Selesai! Video berhasil diunduh ke HP.";
                actionBtn.disabled = false; previewBtn.disabled = false;
                actionBtn.innerText = "Mulai Rekam Video";
                progressContainer.style.display = "none"; isRecording = false;
                
                // Lepas Wake Lock setelah selesai merekam
                releaseWakeLock();
            };

            audioPlayer.currentTime = 0;
            audioPlayer.play();
            mediaRecorder.start();
            renderLoop();
            actionBtn.innerText = "Merekam... Mohon Tunggu";
        });

        audioPlayer.addEventListener('ended', () => {
            if (mediaRecorder && mediaRecorder.state !== "inactive") mediaRecorder.stop();
            if (isPreviewing) { isPreviewing = false; previewBtn.innerText = "Play Preview"; cancelAnimationFrame(animationFrameId); }
        });

        drawPreview();
    </script>
</body>
</html>
